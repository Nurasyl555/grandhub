version: "3.9"

services:

  app:
    build: .
    container_name: granthub-app

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/workspace
      - ./logs:/workspace/logs

    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: granthub-redis

    ports:
      - "6379:6379"

  celery-worker:
    build: .

    container_name: granthub-worker

    command: celery -A app.celery_tasks:celery_app worker --loglevel=info

    env_file:
      - .env

    volumes:
      - .:/workspace
      - ./logs:/workspace/logs

    depends_on:
      - redis